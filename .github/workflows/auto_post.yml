name: Auto Generate XHS

on:
  schedule:
    - cron: "0 0 * * *"   # 北京时间 10:00
    - cron: "0 6 * * *"   # 北京时间 16:00
    - cron: "0 10 * * *"  # 北京时间 20:00
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Decide topic by current schedule
        id: pick
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "02" ]; then
            echo "topic=AI资讯" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "08" ]; then
            echo "topic=AI使用技巧" >> $GITHUB_OUTPUT
          else
            echo "topic=AI工具推荐" >> $GITHUB_OUTPUT
          fi

      - name: Run batch agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m app.batch_main --topic "${{ steps.pick.outputs.topic }}"
